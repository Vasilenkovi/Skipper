build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    formatting: 1
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true


style:
  VarCouldBeVal:
    active: true
  ForbiddenComment:
    active: true
complexity:
  LongParameterList:
    active: true
    functionThreshold: 5
    constructorThreshold: 6
  NestedBlockDepth:
    active: true
    threshold: 4
naming:
  FunctionNaming:
    active: true
    ignoreOverriddenFunctions: true
  MatchingDeclarationName:
    active: true
